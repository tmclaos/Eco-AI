<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-AI Scanner</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1; /* Square for simplicity, matching 640x640 resize */
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #loadingSpinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none; /* Hidden by default */
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 25px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 15px;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #0056b3;
    }
    .btn:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #resultArea {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background-color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: none;
    }
    #topMatch {
      font-size: 24px;
      font-weight: bold;
      color: #28a745; /* Success green */
      margin: 10px 0;
    }
    canvas {
      display: none; /* Hidden canvas for processing */
    }
  </style>
  <!-- Load ONNX Runtime Web via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>AI Scanner</h1>

    <div class="video-wrapper">
      <video id="cameraFeed" autoplay playsinline muted></video>
      <div id="loadingSpinner"></div>
    </div>

    <button id="scanBtn" class="btn" disabled>Loading Model...</button>

    <div id="resultArea">
      <div>Success! Top Match:</div>
      <div id="topMatch">-</div>
    </div>

    <!-- Hidden canvas for image pre-processing -->
    <canvas id="processingCanvas" width="640" height="640"></canvas>
  </div>

  <!-- Include our application logic -->
  <script type="module" src="/src/app.js"></script>
</body>
</html>
