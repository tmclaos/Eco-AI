<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-AI Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <style>
    :root {
      --primary: #4da6ff;
      --bg: #0b192c;
      --card: #1a2c42;
      --text: #e6f2ff;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    .container { width: 100%; max-width: 480px; text-align: center; }
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      margin-bottom: 25px;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    #loader {
      position: absolute; inset: 0;
      background: rgba(11, 25, 44, 0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10;
    }
    .shutter {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 6px solid white;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 0 15px rgba(77, 166, 255, 0.4);
    }
    .shutter:disabled { background: #334; border-color: #556; cursor: not-allowed; }
    #resultView {
      display: none;
      background: var(--card);
      padding: 40px 25px;
      border-radius: 24px;
      width: 100%;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .status-yes { color: var(--primary); font-weight: 800; font-size: 1.8em; margin: 15px 0; }
    .status-no { color: #ff6666; font-size: 1.1em; line-height: 1.5; font-weight: 500; }
    .btn-retry {
      background: var(--primary);
      color: var(--bg);
      border: none;
      padding: 14px 35px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 25px;
    }
    canvas { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <h1 style="letter-spacing: 1px;">ECO-AI <span style="font-weight: 300; font-size: 0.6em; vertical-align: middle;">SCANNER</span></h1>
    <p id="info" style="color: #8a9bb2; margin-bottom: 20px;">Initializing...</p>

    <div id="scannerView">
      <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="loader">
          <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
          <p style="margin-top: 15px;">Loading AI Model...</p>
        </div>
      </div>
      <button id="scanBtn" class="shutter" disabled></button>
    </div>

    <div id="resultView">
      <div id="display"></div>
      <button class="btn-retry" onclick="restart()">Scan Another Item</button>
    </div>
  </div>

  <canvas id="canvas" width="640" height="640"></canvas>
  <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
